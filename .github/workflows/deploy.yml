name: Deploy to GitHub Pages

on:
  # 当 push 到 main 分支时触发
  push:
    branches:
      - main
  
  # 允许手动触发
  workflow_dispatch:

# 设置权限
permissions:
  contents: read
  pages: write
  id-token: write

# 只能同时运行一个部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 构建任务
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # 获取完整历史，用于追踪文件修改时间
      
      # 2. 设置 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'  # 缓存 npm 依赖
      
      # 3. 安装依赖
      - name: Install dependencies
        run: npm ci
      
      # 4. 构建网站
      - name: Build Quartz
        run: npx quartz build --output public
      
      # 5. 上传构建产物
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public
  
  # 部署任务
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      # 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
